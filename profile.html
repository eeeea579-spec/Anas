<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile | FF Clash</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 10px; border-top: 4px solid #FF5722; max-width: 500px; margin: auto; }
        h2 { color: #FF5722; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; color: #bbb; font-size: 14px; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #333; border-radius: 5px; 
            background: #2a2a2a; color: white; box-sizing: border-box; margin-bottom: 5px;
        }
        .btn-save { 
            width: 100%; padding: 15px; background: #FF5722; border: none; 
            color: white; font-weight: bold; border-radius: 5px; margin-top: 25px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Set Your Profile</h2>
        <p style="font-size: 12px; color: #888;">Ye details prize bhejne ke liye zaruri hain.</p>

        <label>Full Name</label>
        <input type="text" id="p_name" placeholder="e.g. Abu Anas">

        <label>Free Fire UID</label>
        <input type="number" id="p_uid" placeholder="10 digit UID">

        <label>Withdrawal Method</label>
        <select id="p_method">
            <option value="UPI">UPI (GPay/PhonePe/Paytm)</option>
            <option value="Bank">Bank Transfer</option>
        </select>

        <label>UPI ID or Account Number</label>
        <input type="text" id="p_details" placeholder="Enter details here">

        <button class="btn-save" id="save-btn">Save & Continue</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config (Wahi purana wala)
        const firebaseConfig = {
            apiKey: "AIzaSyA3gh594oSBNwGgTTAebVP_wPlGKp43c0M",
            authDomain: "ff-clash-622c8.firebaseapp.com",
            projectId: "ff-clash-622c8",
            storageBucket: "ff-clash-622c8.firebasestorage.app",
            messagingSenderId: "575296634837",
            appId: "1:575296634837:web:142bb544bae2a3d491475c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('save-btn').onclick = async function() {
            const user = auth.currentUser;
            if(!user) { alert("Pehle login karein!"); return; }

            const data = {
                fullName: document.getElementById('p_name').value,
                ffUid: document.getElementById('p_uid').value,
                method: document.getElementById('p_method').value,
                paymentDetails: document.getElementById('p_details').value,
                phone: user.phoneNumber,
                timestamp: new Date()
            };

            try {
                // Database mein 'Users' naam ke folder mein data save hoga
                await setDoc(doc(db, "Users", user.uid), data);
                alert("Profile Saved!");
                window.location.href = "dashboard.html";
            } catch (e) {
                alert("Error saving data: " + e.message);
            }
        };
    </script>
</body>
</html>
