<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FF Clash</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; }
        h2 { color: #FF5722; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #FF5722; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        #recaptcha-container { margin-top: 15px; }
        .msg { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>FF CLASH LOGIN</h2>
        <div id="login-section">
            <p>Enter phone with +91</p>
            <input type="tel" id="phoneNumber" placeholder="+91 0000000000" value="+91">
            <div id="recaptcha-container"></div>
            <button id="send-btn" onclick="sendOTP()">Get OTP</button>
        </div>

        <div id="otp-section" style="display:none;">
            <p>Enter 6-Digit OTP</p>
            <input type="number" id="otpCode" placeholder="Enter OTP">
            <button onclick="verifyOTP()">Verify & Login</button>
        </div>
        <p class="msg">Asli OTP aane mein 10-20 sec lag sakte hain.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3gh594oSBNwGgTTAebVP_wPlGKp43c0M",
            authDomain: "ff-clash-622c8.firebaseapp.com",
            projectId: "ff-clash-622c8",
            storageBucket: "ff-clash-622c8.firebasestorage.app",
            messagingSenderId: "575296634837",
            appId: "1:575296634837:web:142bb544bae2a3d491475c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.sendOTP = function() {
            const number = document.getElementById('phoneNumber').value;
            if(number.length < 13) { alert("Please enter full number with +91"); return; }
            
            // ReCaptcha setup
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'normal'
            });
            
            signInWithPhoneNumber(auth, number, window.recaptchaVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('otp-section').style.display = 'block';
                    alert("OTP Sent successfully!");
                }).catch((error) => { 
                    alert("Error: " + error.message);
                    if(window.recaptchaVerifier) window.recaptchaVerifier.clear();
                });
        }

        window.verifyOTP = function() {
            const code = document.getElementById('otpCode').value;
            window.confirmationResult.confirm(code).then((result) => {
                // Login Success
                window.location.href = "profile.html";
            }).catch((error) => { 
                alert("Invalid OTP. Dubara try karein."); 
            });
        }
    </script>
</body>
</html>
