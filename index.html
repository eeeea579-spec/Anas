<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FF Clash</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 10px; max-width: 400px; margin: auto; border-top: 4px solid #FF5722; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #FF5722; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #recaptcha-container { margin-top: 15px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #FF5722;">FF CLASH LOGIN</h2>
        
        <div id="step1">
            <p style="color: #bbb; font-size: 14px;">Apna mobile number dalein</p>
            <input type="tel" id="phone" placeholder="+91xxxxxxxxxx" value="+91">
            <div id="recaptcha-container"></div>
            <button id="get-otp-btn">Get OTP</button>
        </div>

        <div id="step2" style="display: none;">
            <p style="color: #bbb; font-size: 14px;">Phone par aaya code dalein</p>
            <input type="number" id="otp" placeholder="Enter 6-digit OTP">
            <button id="verify-otp-btn">Verify & Login</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Aapka NAYA Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyAghO35iqcGGHjnimNdsvvVZCUouncjdBo",
          authDomain: "ff-clash2.firebaseapp.com",
          projectId: "ff-clash2",
          storageBucket: "ff-clash2.firebasestorage.app",
          messagingSenderId: "101233669042",
          appId: "1:101233669042:web:c74f117c2be4a571beeaab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        auth.useDeviceLanguage();

        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
          'size': 'normal',
          'callback': (response) => {
            // reCAPTCHA solved
          }
        });

        document.getElementById('get-otp-btn').onclick = () => {
            const phoneNumber = document.getElementById('phone').value;
            if(phoneNumber.length < 13) { alert("Sahi number dalein +91 ke sath"); return; }
            
            const appVerifier = window.recaptchaVerifier;

            signInWithPhoneNumber(auth, phoneNumber, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                    alert("OTP Sent! Apna message check karein.");
                }).catch((error) => {
                    alert("Error: " + error.message);
                    window.recaptchaVerifier.render().then(function(widgetId) {
                      grecaptcha.reset(widgetId);
                    });
                });
        };

        document.getElementById('verify-otp-btn').onclick = () => {
            const code = document.getElementById('otp').value;
            window.confirmationResult.confirm(code).then((result) => {
                alert("Login Successful!");
                window.location.href = "profile.html";
            }).catch((error) => {
                alert("Galat OTP! Wapas try karein.");
            });
        };
    </script>
</body>
</html>
