<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FF Clash</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 40px 25px; border-radius: 15px; max-width: 400px; width: 100%; border-top: 5px solid #FF5722; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #FF5722; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        .google-btn { 
            width: 100%; padding: 15px; background: white; color: #444; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 16px; transition: 0.3s;
        }
        .google-btn:hover { background: #f1f1f1; transform: translateY(-2px); }
        p { color: #888; font-size: 14px; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <h2>FF CLASH</h2>
        <p>Tournament mein participate karne ke liye apne Google account se login karein.</p>
        
        <button class="google-btn" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20" alt="G">
            Sign in with Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Aapka Naya Config
        const firebaseConfig = {
          apiKey: "AIzaSyAghO35iqcGGHjnimNdsvvVZCUouncjdBo",
          authDomain: "ff-clash2.firebaseapp.com",
          projectId: "ff-clash2",
          storageBucket: "ff-clash2.firebasestorage.app",
          messagingSenderId: "101233669042",
          appId: "1:101233669042:web:c74f117c2be4a571beeaab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('google-login').onclick = () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    window.location.href = "profile.html";
                }).catch((error) => {
                    alert("Login failed: " + error.message);
                });
        };
    </script>
</body>
</html>
