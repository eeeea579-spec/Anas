<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Tournament | Login</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
            width: 85%;
            max-width: 350px;
            text-align: center;
        }
        .login-box h1 {
            color: #FF5722;
            margin-bottom: 5px;
        }
        .login-box p {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 5px;
            background: #2a2a2a;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #FF5722;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>FF Clash</h1>
        <p>Login to play and win</p>
        
        <input type="number" id="phone" placeholder="10-digit Mobile Number">
        
        <button onclick="location.href='profile.html'">Get OTP & Login</button>
    </div>

</body>
</html>
