<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FF Clash</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px; background: #1e1e1e; border-radius: 10px; margin-bottom: 20px; border-bottom: 4px solid #FF5722; }
        .section { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        h3 { color: #FF5722; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .rules-box { color: #bbb; line-height: 1.6; font-size: 14px; }
        .qr-container { text-align: center; padding: 10px; }
        .qr-img { width: 200px; height: 200px; background: #fff; margin: 10px auto; border-radius: 5px; display: block; }
        .btn-join { width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e1e1e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">FF CLASH DASHBOARD</h2>
        <p id="welcome-msg" style="font-size: 14px; color: #FF5722;"></p>
    </div>

    <div class="section">
        <h3>Tournament Rules</h3>
        <div id="rules-content" class="rules-box">
            Loading rules...
        </div>
    </div>

    <div class="section">
        <h3>Entry Fee Payment</h3>
        <p style="font-size: 12px; color: #888;">Scan karke 20/- pay karein aur screenshot Chat Box mein bhejein.</p>
        <div class="qr-container">
            <img id="qr-display" class="qr-img" src="https://via.placeholder.com/200?text=QR+Loading" alt="QR Code">
        </div>
        <button class="btn-join" onclick="alert('Screenshot bhejne ke baad Admin confirm karega!')">Join Match</button>
    </div>

    <div class="footer-nav">
        <a href="dashboard.html" class="nav-item" style="color: #FF5722;">Home</a>
        <a href="#" class="nav-item">Chat Box</a>
        <a href="profile.html" class="nav-item">Profile</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAghO35iqcGGHjnimNdsvvVZCUouncjdBo",
          authDomain: "ff-clash2.firebaseapp.com",
          projectId: "ff-clash2",
          storageBucket: "ff-clash2.firebasestorage.app",
          messagingSenderId: "101233669042",
          appId: "1:101233669042:web:c74f117c2be4a571beeaab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // User ka naam dikhane ke liye
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('welcome-msg').innerText = "All the best, Player!";
            } else {
                window.location.href = "index.html";
            }
        });

        // Rules aur QR Code Database se khinchne ke liye
        // Hum 'Settings' naam ka ek document banayenge jise aap Admin se control karenge
        const settingsRef = doc(db, "AppData", "TournamentSettings");
        
        onSnapshot(settingsRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('rules-content').innerText = data.rules || "No rules set.";
                document.getElementById('qr-display').src = data.qrUrl || "https://via.placeholder.com/200?text=No+QR+Set";
            } else {
                document.getElementById('rules-content').innerText = "Pehle Admin Panel se rules set karein.";
            }
        });
    </script>
</body>
</html>
